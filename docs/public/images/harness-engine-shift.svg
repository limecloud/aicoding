<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc">
  <title id="title">AI Coding shifts from weights and context to harness engine</title>
  <desc id="desc">A conceptual diagram showing weights, context, and harness layers across 2022 to 2026, where modern AI engineering shifts toward harness engine capabilities such as MCP, tools, security, protocols, skills, orchestration, multi-agent, and workflow graphs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef4ff"/>
      <stop offset="1" stop-color="#f7fafc"/>
    </linearGradient>
    <linearGradient id="weights" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d7d2ff" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#c6e7ff" stop-opacity="0.72"/>
    </linearGradient>
    <linearGradient id="context" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d9e6ff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#edf7ff" stop-opacity="0.68"/>
    </linearGradient>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2l9 5-9 5" fill="none" stroke="#5366a5" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow2022" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2l8 4-8 4" fill="none" stroke="#b22970" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow2023" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2l8 4-8 4" fill="none" stroke="#9a3b92" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow2024" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2l8 4-8 4" fill="none" stroke="#bf560f" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow2025" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2l8 4-8 4" fill="none" stroke="#ef9b20" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow2026" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2l8 4-8 4" fill="none" stroke="#e1a600" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1e2b5b" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1200" height="650" rx="28" fill="#ffffff"/>
  <line x1="52" y1="425" x2="1168" y2="425" stroke="#5366a5" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="60" y1="420" x2="60" y2="616" stroke="#5366a5" stroke-width="5" marker-end="url(#arrow)"/>

  <rect x="58" y="28" width="1088" height="386" rx="22" fill="url(#bg)" stroke="#a8b1c4" stroke-width="4" stroke-dasharray="16 12" filter="url(#shadow)"/>
  <text x="90" y="82" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="42" font-weight="800" fill="#050505">Harness</text>

  <rect x="62" y="132" width="748" height="278" rx="22" fill="url(#context)" stroke="#8295cf" stroke-width="4"/>
  <text x="90" y="192" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="42" font-weight="800" fill="#050505">Context</text>

  <rect x="64" y="242" width="382" height="166" rx="18" fill="url(#weights)" stroke="#6661b6" stroke-width="4"/>
  <text x="92" y="297" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="40" font-weight="800" fill="#171642">Weights</text>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-style="italic" fill="#6b70b9">
    <text x="92" y="346" font-size="25" font-weight="700">Pretraining</text>
    <text x="215" y="374" font-size="30">Scaling Law</text>
    <text x="286" y="336" font-size="24" font-weight="700">Fine-tuning</text>
    <text x="356" y="295" font-size="22">RLHF</text>
    <text x="280" y="278" font-size="16">Few-shot</text>
    <text x="108" y="398" font-size="17">Alignment</text>
    <text x="288" y="406" font-size="15">Instruction-following</text>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-style="italic" fill="#8391c5">
    <text x="314" y="217" font-size="28">Memory</text>
    <text x="442" y="180" font-size="34" font-weight="700">RAG</text>
    <text x="488" y="292" font-size="32">Prompting</text>
    <text x="582" y="180" font-size="26">Long Context</text>
    <text x="498" y="234" font-size="32" font-weight="700">Chain-of-Thought</text>
    <text x="577" y="338" font-size="20">Knowledge Injection</text>
    <text x="526" y="397" font-size="28">Context Engineering</text>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-style="italic" fill="#596783">
    <text x="650" y="68" font-size="36" font-weight="700">MCP</text>
    <text x="507" y="108" font-size="26">Function Calling</text>
    <text x="746" y="82" font-size="26">Tool Ecosystems</text>
    <text x="1004" y="62" font-size="26">Security</text>
    <text x="846" y="125" font-size="28" font-weight="700">Agent Infrastructure</text>
    <text x="840" y="178" font-size="26">Workflow Graphs</text>
    <text x="938" y="238" font-size="30" font-weight="700">Protocols</text>
    <text x="836" y="278" font-size="24">Multi-agent</text>
    <text x="878" y="342" font-size="38" font-weight="800">Skills</text>
    <text x="1046" y="320" font-size="30">A2A</text>
    <text x="928" y="396" font-size="26">Orchestration</text>
  </g>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M74 455H232" stroke="#b22970" stroke-width="4" marker-start="url(#arrow2022)" marker-end="url(#arrow2022)"/>
    <path d="M74 496H384" stroke="#9a3b92" stroke-width="4" marker-start="url(#arrow2023)" marker-end="url(#arrow2023)"/>
    <path d="M74 538H632" stroke="#bf560f" stroke-width="4" marker-start="url(#arrow2024)" marker-end="url(#arrow2024)"/>
    <path d="M74 582H860" stroke="#ef9b20" stroke-width="4" marker-start="url(#arrow2025)" marker-end="url(#arrow2025)"/>
    <path d="M74 623H1130" stroke="#e1a600" stroke-width="4" marker-start="url(#arrow2026)" marker-end="url(#arrow2026)"/>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="800" fill="#171717">
    <text x="125" y="464" font-size="25">2022</text>
    <text x="196" y="506" font-size="25">2023</text>
    <text x="326" y="549" font-size="25">2024</text>
    <text x="440" y="592" font-size="25">2025</text>
    <text x="578" y="634" font-size="25">2026</text>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" fill="#030303">
    <text x="720" y="492" font-size="32" font-style="italic">How do themes</text>
    <text x="720" y="537" font-size="32" font-style="italic">in community shift?</text>
  </g>

  <g transform="translate(1048 488)">
    <rect x="0" y="0" width="46" height="36" rx="8" fill="#f8fafc" stroke="#111827" stroke-width="4"/>
    <path d="M12 12h22M12 23h15" stroke="#111827" stroke-width="3" stroke-linecap="round"/>
    <path d="M14 36l-5 12 18-12" fill="#f8fafc" stroke="#111827" stroke-width="4" stroke-linejoin="round"/>
    <rect x="50" y="12" width="38" height="32" rx="8" fill="#f8fafc" stroke="#111827" stroke-width="4"/>
    <path d="M58 25h20" stroke="#111827" stroke-width="3" stroke-linecap="round"/>
    <circle cx="16" cy="78" r="18" fill="#ff8aa0" stroke="#111827" stroke-width="3"/>
    <circle cx="58" cy="74" r="18" fill="#8ed1ff" stroke="#111827" stroke-width="3"/>
    <circle cx="100" cy="78" r="18" fill="#86efac" stroke="#111827" stroke-width="3"/>
    <path d="M-2 116c4-24 32-24 38 0M40 116c4-24 32-24 38 0M82 116c4-24 32-24 38 0" fill="#ffd88a" stroke="#111827" stroke-width="3"/>
  </g>
</svg>
